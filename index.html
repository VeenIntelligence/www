    <!-- ── SEO: 基础 Meta ── -->

    <meta property="og:title" content="Venn Intelligence Foundation — AI Infrastructure & Intelligent Trading" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@venn_foundation" />
    <meta name="twitter:title" content="Venn Intelligence Foundation" />
    <meta name="twitter:description" content="Funding the first infrastructure protocols for human collective intelligence." />

    <script type="application/ld+json">

          "@type": "Organization",

          "name": "Venn Intelligence Foundation",

          "founder": {
            "@type": "Person",
            "name": "Taitan Pascal"
          },
          "email": "contact@vennai.org",
          "sameAs": [
            "https://twitter.com/venn_foundation",
            "https://github.com/VennIntelligence"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://vennai.org/#website",
          "name": "Venn Intelligence Foundation",
          "url": "https://vennai.org",
          "publisher": { "@id": "https://vennai.org/#organization" },
